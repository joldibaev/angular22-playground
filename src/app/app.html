<main
  class="mx-auto w-[min(1480px,calc(100%-1.5rem))] space-y-7 py-6 text-primary sm:w-[min(1480px,calc(100%-2rem))] md:space-y-10 md:px-4 md:py-12 lg:mr-auto lg:ml-72 lg:w-auto lg:max-w-[1480px] lg:px-8"
>
  <header class="flex flex-col gap-5 px-2 md:flex-row md:items-end md:justify-between md:px-0">
    <div class="max-w-3xl">
      <p class="mb-2 text-xs font-black uppercase tracking-[.08em] text-brand">Angular 22 UI</p>
      <h1 class="text-3xl font-black leading-none text-balance md:text-5xl">
        Каталог компонентов
      </h1>
      <p class="mt-3 max-w-2xl text-sm leading-relaxed text-muted md:text-base">
        Интерактивные примеры, состояния и поддержка платформы в одном месте.
      </p>
    </div>

    <ui-select label="Тема" [value]="theme.theme()" (valueChange)="setTheme($event)">
      @for (option of themeOptions; track option.value) {
        <ui-select-option [value]="option.value" [label]="option.label" />
      }
    </ui-select>
  </header>

  <app-component-catalog-section />
</main>
