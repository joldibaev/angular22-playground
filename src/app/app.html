<main class="mx-auto w-[min(1120px,calc(100%-2rem))] space-y-8 px-4 py-10 text-primary md:py-16">
  <header class="flex flex-col gap-6 md:flex-row md:items-start md:justify-between">
    <div class="max-w-3xl">
      <p class="mb-3 text-xs font-black uppercase tracking-[.08em] text-brand">
        Angular 22 UI
      </p>
      <h1 class="text-4xl font-black leading-none md:text-6xl">Component showcase</h1>
    </div>

    <div class="flex flex-wrap justify-end gap-2" role="group" aria-label="Theme">
      @for (option of themeOptions; track option.value) {
        <button
          uiButton
          size="sm"
          [variant]="theme.theme() === option.value ? 'brand' : 'outline'"
          [attr.aria-pressed]="theme.theme() === option.value"
          (click)="setTheme(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  </header>

  <app-component-catalog-section />
</main>
