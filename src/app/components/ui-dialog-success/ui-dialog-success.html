<ui-dialog
  [dialogId]="dialogId()"
  [title]="title()"
  size="sm"
  [dismiss]="dismiss()"
  [withCloseButton]="false"
  [open]="open()"
  [ariaDescribedBy]="message() ? messageId : null"
  (openChange)="onOpenChange($event)"
>
  <div class="ui-dialog-success-content">
    <span
      #checkRef
      class="ui-dialog-success-check"
      aria-hidden="true"
      [attr.data-state]="checkPhase() === 'in' ? 'in' : 'out'"
    >
      <svg viewBox="0 0 48 48" focusable="false">
        <circle cx="24" cy="24" r="21" />
        <path d="M14.5 24.5 21 31l13-15" />
      </svg>
    </span>

    @if (message()) {
      <p [id]="messageId">{{ message() }}</p>
    }

    <ng-content />
  </div>

  <div uiDialogFooter class="ui-dialog-success-actions">
    <button
      uiButton
      type="button"
      variant="brand"
      command="close"
      [attr.commandfor]="dialogId()"
      (click)="onAcknowledge()"
    >
      {{ actionLabel() }}
    </button>
  </div>
</ui-dialog>
