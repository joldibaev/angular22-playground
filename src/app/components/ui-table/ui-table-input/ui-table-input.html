<input
  #control
  [type]="type()"
  [value]="value()"
  [placeholder]="placeholder()"
  [autocomplete]="autocomplete()"
  [disabled]="disabled()"
  [required]="required()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledBy()"
  [attr.aria-invalid]="invalid() ? 'true' : null"
  (input)="updateValue($event)"
  (blur)="touch.emit()"
/>
