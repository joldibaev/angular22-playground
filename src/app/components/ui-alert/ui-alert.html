<span class="ui-alert-mark" aria-hidden="true">
  <ui-icon class="ui-alert-icon" [name]="icon()" [width]="18" [height]="18" decorative />
</span>

<div class="ui-alert-content">
  <strong class="ui-alert-title">{{ title() }}</strong>
  <div class="ui-alert-description"><ng-content /></div>
</div>

<div class="ui-alert-actions"><ng-content select="[uiAlertAction]" /></div>
