<ui-input
  [label]="label()"
  [loading]="loading()"
  [size]="size()"
  [withErrorMessage]="withErrorMessage()"
>
  <button
    #trigger
    uiInputControl
    type="button"
    class="ui-datepicker-trigger"
    [disabled]="disabled()"
    [attr.aria-expanded]="popupExpanded()"
    aria-haspopup="dialog"
    [attr.aria-controls]="popupExpanded() ? panelId : null"
    [style.anchor-name]="anchorName"
    (click)="toggle()"
    (blur)="touch.emit()"
  >
    <span class="ui-datepicker-trigger-icon" aria-hidden="true">
      <ui-icon name="outline-calendar" />
    </span>

    <span
      #triggerLabel
      class="ui-datepicker-trigger-label calendar-trigger-swap"
      [class.ui-datepicker-placeholder]="displayedTriggerPlaceholder()"
      [attr.data-swap-phase]="triggerSwapPhase()"
      (transitionend)="onTriggerTransitionEnd($event)"
    >
      {{ displayedTriggerValue() }}
    </span>

    @if (!loading()) {
      <ui-icon name="outline-chevron-down" class="ui-datepicker-chevron" />
    }
  </button>
</ui-input>

<!-- The panel stays mounted and is shown/hidden through the popover API
     (syncPopover), like ui-menu — not gated by @if (popupExpanded()). Removing
     the node on close would pop it out instantly and kill the box's
     allow-discrete exit animation.

     ui-popup-surface/ui-popup-box come from the shared ui-popup.css: the surface
     is the transparent positioning shell, the box is the visible card. The
     ui-datepicker-panel class only carries the calendar-specific flip-inline
     fallback. -->
<div
  #panel
  class="ui-popup-surface ui-datepicker-panel"
  popover="auto"
  role="dialog"
  [id]="panelId"
  [attr.aria-labelledby]="titleId"
  [style.position-anchor]="anchorName"
  (toggle)="onPanelToggle($event)"
  (keydown)="onPanelKeydown($event)"
>
  <div class="ui-popup-box">
    <header class="ui-datepicker-header">
      <button
        type="button"
        class="ui-datepicker-nav"
        aria-label="Предыдущий месяц"
        [disabled]="!canGoPrev()"
        (click)="previousMonth()"
      >
        <ui-icon name="outline-chevron-left" />
      </button>

      <h2
        [id]="titleId"
        class="ui-datepicker-title calendar-month-swap"
        aria-live="polite"
        [attr.data-swap-phase]="monthSwapPhase()"
        [attr.data-swap-direction]="monthSwapDirection()"
        (transitionend)="onMonthTransitionEnd($event)"
      >
        {{ monthLabel() }}
      </h2>

      <button
        type="button"
        class="ui-datepicker-nav"
        aria-label="Следующий месяц"
        [disabled]="!canGoNext()"
        (click)="nextMonth()"
      >
        <ui-icon name="outline-chevron-right" />
      </button>
    </header>

    <table
      ngGrid
      #grid="ngGrid"
      class="ui-datepicker-grid calendar-month-swap"
      colWrap="continuous"
      rowWrap="nowrap"
      selectionMode="explicit"
      [enableSelection]="true"
      [softDisabled]="false"
      [attr.aria-label]="monthLabel()"
      [attr.data-swap-phase]="monthSwapPhase()"
      [attr.data-swap-direction]="monthSwapDirection()"
    >
      <thead>
        <tr>
          @for (weekday of weekdays; track weekday) {
            <th scope="col" class="ui-datepicker-weekday">{{ weekday }}</th>
          }
        </tr>
      </thead>

      <tbody>
        @for (week of weeks(); track week[0].date) {
          <tr ngGridRow>
            @for (day of week; track day.date) {
              <td
                ngGridCell
                class="ui-datepicker-cell"
                [disabled]="day.disabled || !day.inCurrentMonth"
                [selected]="day.isSelected"
                [attr.data-focus-target]="day.isFocusTarget ? 'true' : null"
                [attr.aria-current]="day.isToday && day.inCurrentMonth ? 'date' : null"
                [attr.aria-label]="day.inCurrentMonth ? day.ariaLabel : null"
                [attr.aria-hidden]="day.inCurrentMonth ? null : 'true'"
                [class.ui-datepicker-outside]="!day.inCurrentMonth"
                (selectedChange)="onDaySelectionChange(day, $event)"
              >
                @if (day.inCurrentMonth) {
                  <span class="ui-datepicker-day">{{ day.day }}</span>
                }
              </td>
            }
          </tr>
        }
      </tbody>
    </table>

    <footer class="ui-datepicker-footer">
      <button type="button" class="ui-datepicker-action" (click)="reset()">Очистить</button>
      <button
        type="button"
        class="ui-datepicker-action ui-datepicker-action-accent"
        [disabled]="!isTodayAllowed()"
        (click)="setToday()"
      >
        Сегодня
      </button>
    </footer>
  </div>
</div>
