<div ngTabs class="ui-tab-root">
  <div
    ngTabList
    class="ui-tab-list"
    [class.ui-tab-list-pills]="variant() === 'pills'"
    [class.ui-tab-list-line]="variant() === 'line'"
    [class.ui-tab-list-fluid]="fluid()"
    [selectedTab]="selectedTab()"
    (selectedTabChange)="onSelectedTabChange($event)"
    [aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledby() || null"
    [selectionMode]="selectionMode()"
    [orientation]="orientation()"
    [wrap]="wrap()"
    [softDisabled]="softDisabled()"
  >
    @for (item of items(); track item) {
      <button
        #tabTrigger
        ngTab
        class="ui-tab-trigger"
        type="button"
        [value]="item.value()"
        [disabled]="item.disabled()"
        [style.anchor-name]="tabAnchorName($index)"
      >
        @if (item.labelTemplate(); as labelTemplate) {
          <span class="ui-tab-label">
            <ng-container [ngTemplateOutlet]="labelTemplate.template" />
          </span>
        } @else {
          {{ item.displayLabel() }}
        }
      </button>
    }

    <span
      class="ui-tab-indicator"
      aria-hidden="true"
      [style.position-anchor]="activeAnchorName()"
    ></span>
  </div>

  <div class="ui-tab-panels">
    @for (item of items(); track item) {
      <section
        ngTabPanel
        class="ui-tab-panel"
        [value]="item.value()"
        [preserveContent]="preserveContent()"
      >
        <ng-template ngTabContent>
          <ng-container [ngTemplateOutlet]="item.template()" />
        </ng-template>
      </section>
    }
  </div>
</div>
