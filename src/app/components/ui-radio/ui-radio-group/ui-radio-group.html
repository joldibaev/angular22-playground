@if (!hidden()) {
  <fieldset
    class="ui-radio-group"
    [class.ui-radio-group-invalid]="invalid()"
    [class.ui-radio-group-disabled]="disabled()"
    [attr.aria-describedby]="describedBy()"
    [attr.aria-invalid]="invalid() ? 'true' : null"
    [attr.aria-errormessage]="showErrorMessage() ? errorId : null"
  >
    @if (label()) {
      <legend class="ui-radio-group-legend">
        {{ label() }}

        @if (required()) {
          <span class="ui-radio-group-required" aria-hidden="true">*</span>
        }
      </legend>
    }

    @if (description()) {
      <span class="ui-radio-group-description" [id]="descriptionId">{{ description() }}</span>
    }

    <ui-field-error
      [open]="showErrorMessage()"
      [messages]="errorMessages()"
      [panelId]="errorId"
    >
      <div class="ui-radio-group-options">
        <ng-content />
      </div>
    </ui-field-error>

    @if (disabledReasonMessages().length) {
      <span class="ui-radio-group-disabled-reason" [id]="disabledReasonId">
        @for (message of disabledReasonMessages(); track message) {
          <span>{{ message }}</span>
        }
      </span>
    }
  </fieldset>
}
