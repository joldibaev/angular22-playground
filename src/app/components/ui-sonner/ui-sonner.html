@for (group of groups(); track group.position) {
  @if (group.toasts.length > 0) {
    <ol
      #listRef
      tabindex="-1"
      data-sonner-toaster
      [class]="resolvedListClass()"
      [attr.aria-label]="label() + ' ' + hotKeyLabel()"
      [attr.data-theme]="themeAttribute()"
      [attr.data-y-position]="group.y"
      [attr.data-x-position]="group.x"
      [attr.data-position]="group.position"
      [attr.data-offset]="offsetAttribute()"
      [attr.data-width]="widthAttribute()"
      [style]="toasterStyles()"
      (blur)="handleBlur($event)"
      (focus)="handleFocus($event)"
      (mouseenter)="expanded.set(true)"
      (mousemove)="expanded.set(true)"
      (mouseleave)="handleMouseLeave()"
      (pointerdown)="handlePointerDown($event)"
      (pointerup)="interacting.set(false)"
    >
      @for (toast of group.toasts; track toast.id) {
        <ui-sonner-toast
          [index]="$index"
          [toast]="toast"
          [invert]="invert()"
          [position]="position()"
          [visibleToasts]="visibleToasts()"
          [expandByDefault]="expand()"
          [expanded]="expanded()"
          [interacting]="interacting()"
          [duration]="toastOptions().duration ?? duration()"
          [closeButton]="closeButton()"
          [closeLabel]="closeLabel()"
          [gap]="gap()"
          [frontToastHeight]="group.frontToastHeight"
          [width]="widthAttribute()"
          [className]="toastOptions().class ?? ''"
          [descriptionClass]="toastOptions().descriptionClass ?? ''"
        />
      }
    </ol>
  }
}
