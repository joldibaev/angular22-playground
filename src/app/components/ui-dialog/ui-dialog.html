<dialog
  #dialog
  [id]="dialogId()"
  class="ui-dialog"
  [class.ui-dialog-sm]="size() === 'sm'"
  [class.ui-dialog-md]="size() === 'md'"
  [class.ui-dialog-lg]="size() === 'lg'"
  [attr.closedby]="dismiss()"
  [attr.aria-labelledby]="title() ? titleId : null"
  (toggle)="onToggle($event)"
>
  <div class="ui-dialog-surface">
    @if (title() || withCloseButton()) {
      <header class="ui-dialog-header">
        @if (title()) {
          <h2 [id]="titleId" class="ui-dialog-title">{{ title() }}</h2>
        } @else {
          <span></span>
        }

        @if (withCloseButton()) {
          <button
            type="button"
            class="ui-dialog-close"
            command="close"
            [attr.commandfor]="dialogId()"
            aria-label="Close"
          >
            <ui-icon name="outline-x" decorative width="18" height="18" />
          </button>
        }
      </header>
    }

    <div class="ui-dialog-body">
      <ng-content />
    </div>

    <footer class="ui-dialog-footer"><ng-content select="[uiDialogFooter]" /></footer>
  </div>
</dialog>
