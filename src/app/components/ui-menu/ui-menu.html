<div
  ngMenu
  #menuPanel="ngMenu"
  class="ui-popover-surface ui-menu-panel"
  popover="auto"
  (itemSelected)="onItemSelected($event)"
  (toggle)="onPopoverToggle($event)"
>
  <ng-template ngMenuContent>
    @for (item of items(); track item) {
      <div
        ngMenuItem
        class="ui-popover-option ui-menu-item"
        [value]="item.value()"
        [disabled]="item.disabled()"
      >
        <ng-container [ngTemplateOutlet]="item.template()" />
      </div>
    }
  </ng-template>
</div>

<ng-content />
