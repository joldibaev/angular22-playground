@if (!hidden()) {
  <div
    class="ui-switch-container"
    [class.ui-switch-invalid]="invalid()"
    [class.ui-switch-disabled]="disabled()"
  >
    <label class="ui-switch-label" [for]="controlId">
      <input
        #control
        class="ui-switch-input"
        type="checkbox"
        role="switch"
        [id]="controlId"
        [checked]="checked()"
        [disabled]="disabled()"
        [required]="required()"
        [attr.aria-describedby]="describedBy()"
        [attr.aria-invalid]="invalid() ? 'true' : null"
        [attr.aria-errormessage]="showErrorMessage() ? errorId : null"
        (change)="onChange($event)"
        (blur)="touch.emit()"
      />

      <span class="ui-switch-control" aria-hidden="true">
        <span class="ui-switch-thumb"></span>
      </span>

      <span class="ui-switch-copy">
        <span class="ui-switch-title">
          @if (label()) {
            {{ label() }}
          } @else {
            <ng-content />
          }

          @if (required()) {
            <span class="ui-switch-required" aria-hidden="true">*</span>
          }
        </span>

        @if (description()) {
          <span class="ui-switch-description" [id]="descriptionId">{{ description() }}</span>
        }
      </span>
    </label>

    @if (showErrorMessage()) {
      <span class="ui-switch-error" [id]="errorId" role="alert">
        @for (message of errorMessages(); track message) {
          <span>{{ message }}</span>
        }
      </span>
    }

    @if (disabledReasonMessages().length) {
      <span class="ui-switch-disabled-reason" [id]="disabledReasonId">
        @for (message of disabledReasonMessages(); track message) {
          <span>{{ message }}</span>
        }
      </span>
    }
  </div>
}
