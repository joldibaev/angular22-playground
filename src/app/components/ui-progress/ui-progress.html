<progress
  [attr.aria-hidden]="isDecorative() ? 'true' : null"
  [attr.aria-label]="isDecorative() ? null : accessibleLabel()"
  [attr.max]="normalizedMax()"
  [attr.value]="normalizedValue()"
>
  @if (normalizedValue() !== undefined) {
    {{ percentage() }}%
  }
</progress>

<span class="ui-progress-track" aria-hidden="true">
  <span class="ui-progress-indicator"></span>
</span>

@if (withValue() && normalizedValue() !== undefined) {
  <span
    class="ui-progress-value"
    aria-hidden="true"
  >
    @for (item of percentageDigits(); track item.place) {
      <span class="ui-progress-digit-viewport">
        <span class="ui-progress-digit-column" [style.--ui-progress-digit-offset]="item.offset">
          @for (digit of digitValues; track digit) {
            <span class="ui-progress-digit">{{ digit }}</span>
          }
        </span>
      </span>
    }
    <span class="ui-progress-suffix">%</span>
  </span>
}
