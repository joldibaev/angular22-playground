<div
  #tree="ngTree"
  ngTree
  class="ui-tree"
  [nav]="nav()"
  [multi]="multi()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledby()"
  [(value)]="selected"
>
  <ng-template
    [ngTemplateOutlet]="nodeList"
    [ngTemplateOutletContext]="{ nodes: items(), parent: tree }"
  />
</div>

<!-- Self-referencing level renderer: `parent` is the tree root for the top
     level and the owning group for every nested level. -->
<ng-template #nodeList let-nodes="nodes" let-parent="parent">
  @for (node of nodes; track node.id) {
    @let children = node.children ?? [];
    @let branch = children.length > 0;

    <div class="ui-tree-node">
      <button
        #item="ngTreeItem"
        ngTreeItem
        type="button"
        class="ui-tree-item"
        [value]="node.id"
        [parent]="parent"
        [label]="node.label"
        [expanded]="isExpanded(node)"
        [disabled]="node.disabled ?? false"
        [selectable]="node.selectable ?? true"
        (expandedChange)="onExpandedChange(node.id, $event)"
      >
        @if (branch) {
          <ui-icon class="ui-tree-twisty" name="outline-chevron-down" [decorative]="true" />
        } @else {
          <span class="ui-tree-twisty-spacer" aria-hidden="true"></span>
        }

        @if (node.icon; as icon) {
          <ui-icon class="ui-tree-icon" [name]="icon" [decorative]="true" />
        }

        <span class="ui-tree-label">{{ node.label }}</span>
      </button>

      @if (branch) {
        <div role="group" class="ui-tree-group-host">
          <ng-template #group="ngTreeItemGroup" ngTreeItemGroup [ownedBy]="item">
            <div
              class="ui-tree-group"
              animate.enter="ui-tree-group-enter"
              animate.leave="ui-tree-group-leave"
            >
              <ng-template
                [ngTemplateOutlet]="nodeList"
                [ngTemplateOutletContext]="{ nodes: children, parent: group }"
              />
            </div>
          </ng-template>
        </div>
      }
    </div>
  }
</ng-template>
