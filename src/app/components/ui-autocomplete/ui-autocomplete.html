<ui-input
  [label]="label()"
  [loading]="loading()"
  [withErrorMessage]="withErrorMessage()"
>
  <span slot="start" class="ui-autocomplete-start">
    <ng-content select="[slot='start']" />
  </span>

  <input
    ngCombobox
    #combobox="ngCombobox"
    [value]="query()"
    (valueChange)="onQueryChange($event)"
    [(expanded)]="popupExpanded"
    [disabled]="disabled()"
    [inlineSuggestion]="inlineSuggestion()"
    [placeholder]="placeholder()"
    [preserveContent]="true"
    class="autocomplete-input ui-popup-trigger"
    type="text"
    (blur)="touch.emit()"
  />

  @if (!loading()) {
    <span slot="end" class="ui-autocomplete-end">
      <ng-content select="[slot='end']" />
    </span>
  }
</ui-input>

<!-- The popup stays mounted after its first open: @angular/aria's ComboboxPopup
     (DeferredContent) renders it lazily from the combobox's expanded state and,
     because preserveContent is true above, keeps it in the DOM on close. That is
     what lets the popover's allow-discrete exit animation play. Do NOT re-wrap
     this in @if (popupExpanded()) — destroying the node on close pops it out
     instantly and kills the exit (syncPopover drives show/hide on the live node). -->
<ng-template ngComboboxPopup [combobox]="combobox">
  <div
    #popupElement
    class="ui-popup-surface ui-autocomplete-popup"
    popover="auto"
    (toggle)="onPopupToggle($event)"
  >
    <div class="ui-popup-box">
      @if (loading() && !hasOptions()) {
        <div class="ui-popup-status" ngComboboxWidget>
          <ui-loading decorative />
          <span>{{ loadingText() }}</span>
        </div>
      } @else if (hasOptions()) {
        <!-- focusMode="activedescendant": DOM focus stays on the listbox and
             @angular/aria marks the active option with [data-active]. The option
             hover/focus/selected styling lives in ui-popup.css (.ui-popup-option)
             and keys off [data-active] / [aria-selected] — do not add manual
             focus, tabindex, or keyboard handling to the options. -->
        <div
          #listbox="ngListbox"
          ngListbox
          class="ui-popup-list"
          [multi]="false"
          ngComboboxWidget
          [tabindex]="-1"
          focusMode="activedescendant"
          selectionMode="explicit"
          [disabled]="disabled()"
          [(value)]="selectedValues"
          [activeDescendant]="listbox.activeDescendant()"
          (click)="onListboxClick($event)"
          (keydown.enter)="onCommit()"
          (keydown.space)="onCommit()"
        >
          @for (option of options(); track option) {
            <div
              ngOption
              #ngOption="ngOption"
              class="ui-popup-option"
              [value]="option.value()"
              [label]="option.label()"
              [disabled]="option.disabled()"
            >
              <span class="ui-autocomplete-option-label">{{ option.label() }}</span>

              @if (ngOption.selected()) {
                <ui-icon name="outline-check" class="icon-check" />
              }
            </div>
          }
        </div>
      } @else {
        <div class="empty-state" ngComboboxWidget>{{ emptyText() }}</div>
      }
    </div>
  </div>
</ng-template>
