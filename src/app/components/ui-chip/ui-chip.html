<span class="ui-chip-slot"><ng-content select="[slot='start']" /></span>
<span class="ui-chip-label"><ng-content /></span>
<span class="ui-chip-slot"><ng-content select="[slot='end']" /></span>

<button
  type="button"
  class="ui-chip-remove"
  [disabled]="disabled()"
  [attr.aria-label]="removeLabel()"
  (click)="onRemove()"
>
  <ui-icon name="outline-x" decorative [width]="14" [height]="14" />
</button>
