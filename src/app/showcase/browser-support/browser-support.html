<aside
  class="support"
  [attr.data-status]="statusKind()"
  [attr.aria-label]="'Browser compatibility: ' + statusLabel()"
>
  <div class="baseline">
    <img
      class="baseline-icon"
      [src]="'/baseline-icons/' + statusKind() + '.svg'"
      alt=""
      width="36"
      height="20"
    />
    <strong>Baseline @if (baselineYear(); as year) { {{ year }} }</strong>
    <span class="status">{{ statusLabel() }}</span>
  </div>

  <ul class="browsers" aria-label="Minimum browser versions">
    @for (browser of browsers(); track browser.id) {
      <li [attr.aria-label]="browser.label + (browser.version ? ' ' + browser.version + ' and later' : ': not supported')">
        <img
          class="browser-icon"
          [src]="'/browser-logos/' + browser.id + '.svg'"
          alt=""
          width="24"
          height="24"
        />
        <span class="version" [class.unsupported]="!browser.version">
          {{ browser.version ?? '—' }}
        </span>
      </li>
    }
  </ul>

  <p class="features">
    <span class="sr-only">Features:</span>
    @for (name of featureNames(); track name; let last = $last) {
      <code>{{ name }}</code>@if (!last) {<span aria-hidden="true">, </span>}
    }
  </p>
</aside>
