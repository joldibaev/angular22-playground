<article class="grid min-w-0 gap-4 rounded-lg bg-primary p-5 md:grid-cols-2">
  <section class="grid gap-2">
    <h4 class="font-black">Horizontal pills</h4>
    <ui-segmented aria-label="Density" orientation="horizontal">
      <ui-segmented-item value="compact">Compact</ui-segmented-item>
      <ui-segmented-item value="comfortable">Comfortable</ui-segmented-item>
      <ui-segmented-item value="spacious" [disabled]="true">Spacious</ui-segmented-item>
    </ui-segmented>
  </section>

  <section class="grid gap-2">
    <h4 class="font-black">Horizontal line</h4>
    <ui-segmented aria-label="View style" appearance="line" orientation="horizontal">
      <ui-segmented-item value="list">List</ui-segmented-item>
      <ui-segmented-item value="grid">Grid</ui-segmented-item>
    </ui-segmented>
  </section>

  <section class="grid gap-2">
    <h4 class="font-black">Vertical pills</h4>
    <ui-segmented aria-label="Support channel" orientation="vertical">
      <ui-segmented-item value="email">Email</ui-segmented-item>
      <ui-segmented-item value="chat">Chat</ui-segmented-item>
      <ui-segmented-item value="phone" [disabled]="true">Phone</ui-segmented-item>
    </ui-segmented>
  </section>

  <section class="grid gap-2">
    <h4 class="font-black">Vertical line</h4>
    <ui-segmented aria-label="Report section" appearance="line" orientation="vertical">
      <ui-segmented-item value="summary">Summary</ui-segmented-item>
      <ui-segmented-item value="details">Details</ui-segmented-item>
      <ui-segmented-item value="exports">Exports</ui-segmented-item>
    </ui-segmented>
  </section>

  <section class="grid gap-2">
    <h4 class="font-black">Fluid width</h4>
    <ui-segmented aria-label="Billing period" orientation="horizontal" fluid>
      <ui-segmented-item value="monthly">Monthly</ui-segmented-item>
      <ui-segmented-item value="annual">Annual</ui-segmented-item>
    </ui-segmented>
  </section>

  <section class="grid gap-2">
    <h4 class="font-black">No selection indicator</h4>
    <ui-segmented selection="none" aria-label="Static filters">
      <ui-segmented-item value="all">All</ui-segmented-item>
      <ui-segmented-item value="open">Open</ui-segmented-item>
      <ui-segmented-item value="closed">Closed</ui-segmented-item>
    </ui-segmented>
  </section>
</article>
