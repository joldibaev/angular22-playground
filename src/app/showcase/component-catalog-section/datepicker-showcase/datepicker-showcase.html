<article class="grid min-w-0 gap-4 rounded-lg bg-primary p-5">
  <div class="grid min-w-0 gap-4 md:grid-cols-2">
    <ui-datepicker label="Plain" />

    <ui-datepicker label="Preselected" value="2026-06-15" />

    <ui-datepicker
      label="Limited window"
      value="2026-06-15"
      min="2026-06-05"
      max="2026-06-25"
    />

    <ui-datepicker label="Disabled" value="2026-06-15" [disabled]="true" />

    <ui-datepicker label="Loading" value="2026-06-15" loading />

    <ui-datepicker label="Small (sm)" size="sm" value="2026-06-15" />

    <ui-datepicker label="Medium (md)" value="2026-06-15" />
  </div>

  <div class="grid min-w-0 gap-4 border-t border-default pt-4 md:grid-cols-2">
    <ui-datepicker label="Signal form date" [formField]="formState.invoiceDate" />

    <ui-datepicker label="Required date" withErrorMessage [formField]="formState.requiredDate" />
  </div>

  <div class="grid min-w-0 gap-4 border-t border-default pt-4 md:grid-cols-2">
    <ui-date-range-picker
      label="Preselected range"
      [value]="preselectedRange"
    />

    <ui-date-range-picker
      label="Limited range"
      [value]="preselectedRange"
      minDate="2026-06-05"
      maxDate="2026-07-25"
    />

    <ui-date-range-picker
      label="No presets"
      [value]="preselectedRange"
      [withPresets]="false"
    />

    <ui-date-range-picker label="Loading" [value]="preselectedRange" loading />

    <ui-date-range-picker label="Signal form range" [formField]="formState.reportRange" />

    <ui-date-range-picker label="Small (sm)" size="sm" [value]="preselectedRange" />

    <ui-date-range-picker label="Medium (md)" [value]="preselectedRange" />
  </div>

  <div class="grid min-w-0 gap-2 rounded-lg border border-default p-4 text-sm">
    <p class="font-black text-muted">Signal form value</p>
    <pre class="overflow-auto rounded bg-subtle p-3 text-xs">{{ model() | json }}</pre>
  </div>
</article>
