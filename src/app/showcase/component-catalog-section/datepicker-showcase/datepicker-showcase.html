<article class="docs" aria-labelledby="date-title">
  <header>
    <h4 id="date-title" class="font-black">Datepicker</h4>
    <p>Single-date and date-range selection with limits, presets, states, and Signal Forms.</p>
  </header>
  <section>
    <h5>Single date</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Single date example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-datepicker label="Invoice date" value="2026-06-15" /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="singleCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Date limits</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Limited date example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-datepicker
              label="Delivery date"
              value="2026-06-15"
              min="2026-06-05"
              max="2026-06-25"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="limitsCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Date range</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Date range example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-date-range-picker label="Report range" [value]="range" /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="rangeCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Range without presets</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Range without presets example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-date-range-picker
              label="Custom range"
              [value]="range"
              [withPresets]="false"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="presetsCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Sizes and states</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Datepicker sizes and states"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview grid">
            <ui-datepicker label="Small" size="sm" value="2026-06-15" /><ui-datepicker
              label="Disabled"
              value="2026-06-15"
              disabled
            /><ui-datepicker label="Loading" value="2026-06-15" loading /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="statesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Signal Forms validation</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Datepicker validation example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-datepicker
              label="Required date"
              withErrorMessage
              [formField]="formState.requiredDate"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="formCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
