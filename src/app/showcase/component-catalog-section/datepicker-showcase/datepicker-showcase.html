<article class="docs" aria-labelledby="date-title">
  <header>
    <h4 id="date-title" class="font-black">Datepicker</h4>
    <p>Single-date selection with limits, states, and Signal Forms.</p>
  </header>
  <app-showcase-example heading="Single date" aria-label="Single date example" [code]="singleCode">
    <div class="preview">
      <ui-datepicker label="Invoice date" value="2026-06-15" />
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Date limits" aria-label="Limited date example" [code]="limitsCode">
    <div class="preview">
      <ui-datepicker label="Delivery date" value="2026-06-15" min="2026-06-05" max="2026-06-25" />
    </div>
  </app-showcase-example>
  <app-showcase-example heading="States" aria-label="Datepicker states" [code]="statesCode">
    <div class="preview grid">
      <ui-datepicker label="Disabled" value="2026-06-15" disabled /><ui-datepicker
        label="Loading"
        value="2026-06-15"
        loading
      />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Signal Forms validation"
    aria-label="Datepicker validation example"
    [code]="formCode"
  >
    <div class="preview">
      <ui-datepicker label="Required date" withErrorMessage [formField]="formState.requiredDate" />
    </div>
  </app-showcase-example>
</article>
