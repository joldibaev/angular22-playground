<article class="docs" aria-labelledby="button-title">
  <header>
    <h4 id="button-title" class="font-black">Button</h4>
    <p>
      Actions and button-styled links with variants, sizes, busy state, icons, and layout options.
    </p>
  </header>
  <section>
    <h5>Variants</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Button variants"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            @for (variant of variants; track variant) {
              <button uiButton type="button" [variant]="variant">{{ variant }}</button>
            }
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="variantsCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Sizes and shape</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Button sizes and shapes"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <button uiButton type="button" size="sm">Small</button
            ><button uiButton type="button">Medium</button
            ><button uiButton type="button" variant="brand" rounded>Pill</button>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="sizesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>States</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Button states"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <button uiButton type="button">Enabled</button
            ><button uiButton type="button" disabled>Disabled</button
            ><button
              uiButton
              type="button"
              variant="brand"
              [loading]="saving()"
              (click)="save()"
            >
              Save changes
            </button>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="statesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Icons</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Buttons with icons"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <button uiButton type="button" variant="brand">
              <ui-icon name="outline-plus" decorative />Create</button
            ><button uiButton type="button" variant="ghost" iconOnly aria-label="Settings">
              <ui-icon name="outline-settings" decorative />
            </button></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="iconsCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Anchor host</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Button styled links"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <a uiButton href="#component-catalog" variant="outline">Open catalog</a
            ><a uiButton href="#component-catalog" disabled>Unavailable</a>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="anchorCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Fluid</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Fluid button"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <button uiButton type="button" variant="brand" fluid>Continue</button>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="fluidCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
