<article class="docs" aria-labelledby="context-menu-showcase-title">
  <header>
    <h4 id="context-menu-showcase-title" class="font-black">Context menu</h4>
    <p>
      Pointer-positioned actions with Angular Aria navigation. Right-click, long-press, or use
      Shift+F10 / the Menu key.
    </p>
  </header>

  <section aria-labelledby="context-menu-default-title">
    <h5 id="context-menu-default-title">Target context</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Context menu example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <div class="file-grid" aria-label="Example files">
              @for (file of files; track file.name) {
                <div
                  class="file"
                  tabindex="0"
                  [uiContextMenuTrigger]="fileMenu"
                  [uiContextMenuContext]="file"
                >
                  <ui-icon name="outline-file-import" decorative />
                  <strong>{{ file.name }}</strong>
                  <span>{{ file.kind }}</span>
                </div>
              }
            </div>

            <ui-context-menu #fileMenu (itemSelected)="run($event)"
              ><ui-menu-item value="open">Open</ui-menu-item
              ><ui-menu-group label="Organize"
                ><ui-menu-item value="rename"
                  ><ui-icon name="outline-edit" decorative />Rename</ui-menu-item
                ><ui-menu-item value="duplicate"
                  ><ui-icon name="outline-copy" decorative />Duplicate</ui-menu-item
                ></ui-menu-group
              ><ui-menu-item value="delete" variant="destructive"
                ><ui-icon name="outline-trash" decorative />Delete</ui-menu-item
              ></ui-context-menu
            >

            <output aria-live="polite">Last action: {{ lastAction() }}</output>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="defaultCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
