      <app-select-showcase />
    </ui-tab-item>

    <ui-tab-item value="input" label="Input">
      <app-input-showcase />
    </ui-tab-item>

    <ui-tab-item value="autocomplete" label="Autocomplete">

    <ui-tab-item value="menu" label="Menu">

    <ui-tab-item value="tabs" label="Tabs">
