<section id="component-catalog" class="space-y-6">
  <ui-tab aria-label="Component catalog" fluid queryParam="component">
    <ui-tab-item value="card" label="Card">
      <ui-card><app-card-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="select" label="Select">
      <ui-card><app-select-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="input" label="Input">
      <ui-card><app-input-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="autocomplete" label="Autocomplete">
      <ui-card><app-autocomplete-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="menu" label="Menu">
      <ui-card><app-menu-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="tabs" label="Tabs">
      <ui-card><app-tabs-showcase /></ui-card>
    </ui-tab-item>

    <ui-tab-item value="tooltip" label="Tooltip">
      <ui-card><app-tooltip-showcase /></ui-card>
