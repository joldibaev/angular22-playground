<article class="docs" aria-labelledby="loading-title">
  <header>
    <h4 id="loading-title" class="font-black">Loading</h4>
    <p>
      Compact progress indicators for standalone status and decorative use inside an already
      labelled control.
    </p>
  </header>
  <app-showcase-example
    heading="Accessible status"
    aria-label="Accessible loading example"
    [code]="statusCode"
  >
    <ng-container showcaseNote
      >Add a label when loading is a standalone status. Without one, the indicator is decorative by
      default; use <code>decorative</code> to make that intent explicit.</ng-container
    >
    <div class="preview">
      <ui-loading label="Loading results" [size]="24" />
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Sizes" aria-label="Loading sizes" [code]="sizesCode">
    <div class="preview row">
      <ui-loading decorative [size]="16" /><ui-loading decorative [size]="24" /><ui-loading
        decorative
        [size]="32"
      />
    </div>
  </app-showcase-example>
</article>
