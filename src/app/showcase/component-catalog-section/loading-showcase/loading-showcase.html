<article class="docs" aria-labelledby="loading-title">
  <header>
    <h4 id="loading-title" class="font-black">Loading</h4>
    <p>
      Compact progress indicators for standalone status and decorative use inside an already
      labelled control.
    </p>
  </header>
  <section>
    <h5>Accessible status</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Accessible loading example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-loading label="Loading results" [size]="24" /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="statusCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
    <p class="hint">
      Add a label when loading is a standalone status. Without one, the indicator is decorative by
      default; use <code>decorative</code> to make that intent explicit.
    </p>
  </section>
  <section>
    <h5>Sizes</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Loading sizes"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <ui-loading decorative [size]="16" /><ui-loading decorative [size]="24" /><ui-loading
              decorative
              [size]="32"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="sizesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
