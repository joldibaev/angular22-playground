<article class="docs" aria-labelledby="card-title">
  <header>
    <h4 id="card-title" class="font-black">Card</h4>
    <p>A neutral content surface with glass and outlined treatments.</p>
  </header>
  <app-showcase-example heading="Glass" aria-label="Glass card example" [code]="glassCode">
    <div class="preview">
      <ui-card
        ><h6>Account summary</h6>
        <p>Review usage and billing for this workspace.</p></ui-card
      >
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Outlined" aria-label="Outlined card example" [code]="outlinedCode">
    <div class="preview">
      <ui-card variant="outlined"
        ><h6>Team access</h6>
        <p>Manage roles and invitations.</p></ui-card
      >
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Custom padding"
    aria-label="Compact card example"
    [code]="paddingCode"
  >
    <div class="preview">
      <ui-card class="compact" variant="outlined">Compact repeated item</ui-card>
    </div>
  </app-showcase-example>
</article>
