<article class="docs" aria-labelledby="radio-title">
  <header>
    <h4 id="radio-title" class="font-black">Radio</h4>
    <p>
      One choice from a labelled group, with native keyboard behavior and Signal Forms integration.
    </p>
  </header>
  <app-showcase-example heading="Default" aria-label="Radio group example" [code]="defaultCode">
    <div class="preview">
      <ui-radio-group
        label="Density"
        description="Choose the interface density."
        value="comfortable"
        ><ui-radio value="compact">Compact</ui-radio
        ><ui-radio value="comfortable">Comfortable</ui-radio></ui-radio-group
      >
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Sizes and option state"
    aria-label="Radio sizes and disabled options"
    [code]="statesCode"
  >
    <div class="preview">
      <ui-radio-group size="sm" label="Plan"
        ><ui-radio value="starter">Starter</ui-radio><ui-radio value="growth">Growth</ui-radio
        ><ui-radio value="legacy" disabled>Legacy</ui-radio></ui-radio-group
      >
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Required validation"
    aria-label="Required radio group example"
    [code]="validationCode"
  >
    <div class="preview">
      <ui-radio-group label="Billing plan" withErrorMessage [formField]="formState.plan"
        ><ui-radio value="starter">Starter</ui-radio
        ><ui-radio value="growth">Growth</ui-radio></ui-radio-group
      >
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Disabled reason"
    aria-label="Disabled radio group example"
    [code]="disabledCode"
  >
    <div class="preview">
      <ui-radio-group label="Approval flow" [formField]="formState.approval"
        ><ui-radio value="manual">Manual</ui-radio
        ><ui-radio value="automatic">Automatic</ui-radio></ui-radio-group
      >
    </div>
  </app-showcase-example>
</article>
