<article class="grid min-w-0 gap-4 rounded-lg bg-primary p-5">
  <div class="flex flex-wrap items-center gap-3">
    <button uiButton uiMenuTrigger variant="outline" [menu]="catalogMenu.menu()">
      Command menu
    </button>
    <ui-menu #catalogMenu (itemSelected)="selectedCommand.set($event)">
      <ui-menu-item value="duplicate">Duplicate</ui-menu-item>
      <ui-menu-item value="archive">Archive</ui-menu-item>
      <ui-menu-item value="delete" [disabled]="true">Delete locked item</ui-menu-item>
    </ui-menu>

    <button uiButton uiMenuTrigger variant="outline" [menu]="statusMenu.menu()">
      Status menu
    </button>
    <ui-menu #statusMenu (itemSelected)="selectedCommand.set($event)">
      <ui-menu-item value="todo">Todo</ui-menu-item>
      <ui-menu-item value="doing">Doing</ui-menu-item>
      <ui-menu-item value="done">Done</ui-menu-item>
    </ui-menu>

    <!-- Icon-only (kebab) trigger: a tiny anchor, so the menu opens at its own
         min-width (12rem) rather than the trigger's width — handy for eyeballing
         how the popup sizes itself against a narrow trigger. -->
    <button
      uiButton
      uiMenuTrigger
      variant="secondary"
      aria-label="More actions"
      [menu]="moreMenu.menu()"
    >
      <ui-icon name="outline-dots-vertical" decorative />
    </button>
    <ui-menu #moreMenu (itemSelected)="selectedCommand.set($event)">
      <ui-menu-item value="rename">Rename</ui-menu-item>
      <ui-menu-item value="move">Move to…</ui-menu-item>
      <ui-menu-item value="share">Share</ui-menu-item>
      <ui-menu-item value="remove">Remove</ui-menu-item>
    </ui-menu>
  </div>

  <output
    class="rounded-lg border border-default bg-surface p-3 text-sm font-bold text-secondary"
    aria-label="Selected command"
  >
    {{ selectedCommand() }}
  </output>
</article>
