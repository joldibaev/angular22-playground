<article class="docs" aria-labelledby="menu-showcase-title">
  <header>
    <h4 id="menu-showcase-title" class="font-black">Menu</h4>
    <p>Action menus with native top-layer positioning and Angular Aria keyboard navigation.</p>
  </header>
  <section aria-labelledby="menu-default-title">
    <h5 id="menu-default-title">Default</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Default menu example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <button
              uiButton
              type="button"
              uiMenuTrigger
              variant="outline"
              [menu]="defaultMenu.menu()"
            >
              Actions</button
            ><ui-menu #defaultMenu (itemSelected)="selected.set($event)"
              ><ui-menu-item value="duplicate"
                ><ui-icon slot="start" name="outline-copy" decorative /><span
                  >Duplicate</span
                ><kbd slot="end">⌘D</kbd></ui-menu-item
              ><ui-menu-item value="archive"
                ><ui-icon slot="start" name="outline-archive" decorative /><span>Archive</span></ui-menu-item></ui-menu
            ><output aria-live="polite">Selected: {{ selected() }}</output>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="defaultCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section aria-labelledby="menu-group-title">
    <h5 id="menu-group-title">Groups</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Grouped menu example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <button
              uiButton
              type="button"
              uiMenuTrigger
              variant="outline"
              [menu]="groupedMenu.menu()"
            >
              Grouped actions</button
            ><ui-menu #groupedMenu (itemSelected)="selected.set($event)"
              ><ui-menu-item value="inspect"
                ><ui-icon slot="start" name="outline-search" decorative /><span>Inspect</span></ui-menu-item
              ><ui-menu-group label="Editing"
                ><ui-menu-item value="duplicate"
                  ><ui-icon slot="start" name="outline-copy" decorative /><span>Duplicate</span></ui-menu-item
                ><ui-menu-item value="rename"
                  ><ui-icon slot="start" name="outline-edit" decorative /><span>Rename</span></ui-menu-item></ui-menu-group
              ><ui-menu-group label="Danger zone"
                ><ui-menu-item value="archive"
                  ><ui-icon slot="start" name="outline-archive" decorative /><span>Archive</span></ui-menu-item></ui-menu-group
              ></ui-menu
            >
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="groupCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section aria-labelledby="menu-state-title">
    <h5 id="menu-state-title">Disabled and destructive items</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Menu item state examples"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <button
              uiButton
              type="button"
              uiMenuTrigger
              variant="outline"
              [menu]="stateMenu.menu()"
            >
              Item states</button
            ><ui-menu #stateMenu (itemSelected)="selected.set($event)"
              ><ui-menu-item value="edit"
                ><ui-icon slot="start" name="outline-pencil" decorative /><span>Edit</span></ui-menu-item
              ><ui-menu-item value="locked" disabled
                ><ui-icon slot="start" name="outline-lock" decorative /><span>Locked action</span></ui-menu-item
              ><ui-menu-item value="remove" variant="destructive"
                ><ui-icon slot="start" name="outline-trash" decorative /><span>Remove</span></ui-menu-item></ui-menu
            >
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="stateCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
