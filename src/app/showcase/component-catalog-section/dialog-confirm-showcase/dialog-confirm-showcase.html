<article class="dialog-confirm-showcase" aria-labelledby="dialog-confirm-showcase-title">
  <header class="dialog-confirm-showcase-header">
    <h4 id="dialog-confirm-showcase-title" class="font-black">Dialog confirm</h4>
    <p>A focused alert dialog for decisions with explicit confirm and cancel outcomes.</p>
  </header>

  <section class="dialog-confirm-example" aria-labelledby="dialog-confirm-default-title">
    <h5 id="dialog-confirm-default-title">Default</h5>
    <ui-card variant="outlined">
      <ui-tab size="sm" aria-label="Default confirmation dialog example">
        <ui-tab-item value="preview" label="Preview">
          <div class="dialog-confirm-preview">
            <button
              uiButton
              type="button"
              command="show-modal"
              [attr.commandfor]="saveConfirm.dialogId()"
            >
              Save changes
            </button>
          </div>
        </ui-tab-item>
        <ui-tab-item value="code" label="Code">
<app-showcase-code [code]="defaultCode" />
        </ui-tab-item>
      </ui-tab>
    </ui-card>
    <ui-dialog-confirm
      #saveConfirm="uiDialogConfirm"
      title="Save changes?"
      message="The new values become visible immediately."
      confirmLabel="Save"
      cancelLabel="Cancel"
      (confirm)="report('Saved')"
      (cancel)="report('Kept editing')"
    />
  </section>

  <section class="dialog-confirm-example" aria-labelledby="dialog-confirm-destructive-title">
    <h5 id="dialog-confirm-destructive-title">Destructive</h5>
    <ui-card variant="outlined">
      <ui-tab size="sm" aria-label="Destructive confirmation dialog example">
        <ui-tab-item value="preview" label="Preview"
          ><div class="dialog-confirm-preview">
            <button
              uiButton
              type="button"
              variant="destructive"
              command="show-modal"
              [attr.commandfor]="deleteConfirm.dialogId()"
            >
              Delete item
            </button>
          </div></ui-tab-item
        >
        <ui-tab-item value="code" label="Code">
<app-showcase-code [code]="destructiveCode" />
        </ui-tab-item>
      </ui-tab>
    </ui-card>
    <ui-dialog-confirm
      #deleteConfirm="uiDialogConfirm"
      tone="destructive"
      title="Delete item?"
      message="This action cannot be undone."
      confirmLabel="Delete"
      cancelLabel="Keep item"
      (confirm)="report('Deleted')"
      (cancel)="report('Kept item')"
    />
  </section>

  <section class="dialog-confirm-example" aria-labelledby="dialog-confirm-copy-title">
    <h5 id="dialog-confirm-copy-title">Custom copy</h5>
    <ui-card variant="outlined">
      <ui-tab size="sm" aria-label="Custom confirmation copy example">
        <ui-tab-item value="preview" label="Preview"
          ><div class="dialog-confirm-preview">
            <button
              uiButton
              type="button"
              variant="outline"
              command="show-modal"
              [attr.commandfor]="publishConfirm.dialogId()"
            >
              Publish release
            </button>
          </div></ui-tab-item
        >
        <ui-tab-item value="code" label="Code">
<app-showcase-code [code]="copyCode" />
        </ui-tab-item>
      </ui-tab>
    </ui-card>
    <ui-dialog-confirm
      #publishConfirm="uiDialogConfirm"
      title="Publish release?"
      message="Version 2.4.0 will become available to every workspace."
      confirmLabel="Publish now"
      cancelLabel="Review again"
      (confirm)="report('Published')"
      (cancel)="report('Returned to review')"
    />
  </section>

  <section class="dialog-confirm-example" aria-labelledby="dialog-confirm-outcome-title">
    <h5 id="dialog-confirm-outcome-title">Outcomes and dismissal</h5>
    <p class="dialog-confirm-context">
      Cancel also covers Escape, backdrop light dismiss, and the built-in close button.
    </p>
    <ui-card variant="outlined">
      <ui-tab size="sm" aria-label="Confirmation outcome example">
        <ui-tab-item value="preview" label="Preview"
          ><div class="dialog-confirm-preview dialog-confirm-outcome">
            <button
              uiButton
              type="button"
              variant="outline"
              command="show-modal"
              [attr.commandfor]="discardConfirm.dialogId()"
            >
              Discard draft
            </button>
            <span aria-live="polite">Last action: {{ lastAction() }}</span>
          </div></ui-tab-item
        >
        <ui-tab-item value="code" label="Code">
<app-showcase-code [code]="cancelCode" />
        </ui-tab-item>
      </ui-tab>
    </ui-card>
    <ui-dialog-confirm
      #discardConfirm="uiDialogConfirm"
      tone="destructive"
      title="Discard draft?"
      message="Your unpublished changes will be lost."
      confirmLabel="Discard"
      cancelLabel="Keep draft"
      (confirm)="report('Discarded draft')"
      (cancel)="report('Kept draft')"
    />
  </section>
</article>
