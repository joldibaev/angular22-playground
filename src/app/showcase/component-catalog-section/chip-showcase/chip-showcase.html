<div class="grid min-w-0 gap-4">
  <div class="flex flex-wrap items-center gap-2">
    <ui-chip removeLabel="Remove default token">Default</ui-chip>
    <ui-chip variant="destructive" removeLabel="Remove alert">Destructive</ui-chip>
    <ui-chip disabled removeLabel="Remove disabled token">Disabled</ui-chip>
  </div>

  <div class="flex flex-wrap items-center gap-2">
    @for (tag of tags(); track tag) {
      <ui-chip [removeLabel]="'Remove ' + tag" (remove)="removeTag(tag)">
        {{ tag }}
      </ui-chip>
    } @empty {
      <button type="button" class="text-sm font-bold text-secondary underline" (click)="reset()">
        Reset tags
      </button>
    }
  </div>
</div>
