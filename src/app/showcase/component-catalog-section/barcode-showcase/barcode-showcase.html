<article class="barcode-showcase" aria-labelledby="barcode-showcase-title">
  <header class="barcode-showcase-header">
    <h4 id="barcode-showcase-title" class="font-black">Barcode</h4>
    <p>Scanner-safe SVG barcodes with validation, sizing, and explicit accessible labeling.</p>
  </header>

  <app-showcase-example heading="Default" aria-label="Default barcode example" [code]="defaultCode">
    <div class="barcode-preview">
      <ui-barcode value="ITEM-42-A" format="CODE128" label="Inventory item ITEM-42-A" />
    </div>
  </app-showcase-example>

  <app-showcase-example heading="Formats" aria-label="Barcode format examples" [code]="formatsCode">
    <div class="barcode-preview barcode-grid">
      <figure>
        <ui-barcode value="4006381333931" format="EAN13" />
        <figcaption>EAN-13</figcaption>
      </figure>
      <figure>
        <ui-barcode value="55123457" format="EAN8" />
        <figcaption>EAN-8</figcaption>
      </figure>
      <figure>
        <ui-barcode value="BC-123" format="QR" [width]="112" [height]="112" />
        <figcaption>QR version 1-L</figcaption>
      </figure>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Dimensions"
    aria-label="Barcode dimension examples"
    [code]="dimensionsCode"
  >
    <div class="barcode-preview barcode-grid">
      <ui-barcode value="ITEM-42-A" [width]="320" [height]="112" /><ui-barcode
        value="BC-123"
        format="QR"
        [width]="160"
        [height]="160"
      />
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Human-readable text"
    aria-label="Barcode text examples"
    [code]="textCode"
  >
    <div class="barcode-preview barcode-grid">
      <figure>
        <ui-barcode value="ITEM-42-A" />
        <figcaption>With text</figcaption>
      </figure>
      <figure>
        <ui-barcode value="ITEM-42-A" [withText]="false" />
        <figcaption>Without text</figcaption>
      </figure>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Accessible and decorative"
    aria-label="Barcode accessibility examples"
    [code]="accessibilityCode"
  >
    <div class="barcode-preview barcode-grid">
      <ui-barcode value="ITEM-42-A" label="Inventory item barcode" /><ui-barcode
        value="DECORATION"
        decorative
      />
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Invalid data"
    aria-label="Barcode validation examples"
    [code]="validationCode"
  >
    <ng-container showcaseDescription
      >EAN values validate length and checksum; the built-in QR encoder supports version 1-L
      payloads up to 17 UTF-8 bytes.</ng-container
    >
    <div class="barcode-preview barcode-grid">
      <ui-barcode value="12345678" format="EAN8" /><ui-barcode
        value="012345678901234567"
        format="QR"
      />
    </div>
  </app-showcase-example>
</article>
