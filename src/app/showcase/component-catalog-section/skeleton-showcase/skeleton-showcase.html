<article class="docs" aria-labelledby="skeleton-title">
  <header>
    <h4 id="skeleton-title" class="font-black">Skeleton</h4>
    <p>Decorative placeholders; the surrounding loading region owns the accessible status.</p>
  </header>
  <app-showcase-example heading="Shapes" aria-label="Skeleton shape examples" [code]="shapesCode">
    <div class="preview row">
      <ui-skeleton class="line" /><ui-skeleton shape="circle" /><ui-skeleton
        class="rectangle"
        shape="rectangle"
      />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Composed loading state"
    aria-label="Composed skeleton example"
    [code]="compositionCode"
  >
    <article class="profile" aria-busy="true" aria-label="Loading profile">
      <ui-skeleton class="avatar" shape="circle" />
      <div>
        <ui-skeleton class="name" /><ui-skeleton class="detail" /><ui-skeleton class="short" />
      </div>
    </article>
  </app-showcase-example>
  <app-showcase-example
    heading="Static placeholder"
    aria-label="Static skeleton example"
    [code]="staticCode"
  >
    <div class="preview">
      <ui-skeleton class="rectangle" shape="rectangle" [withAnimation]="false" />
    </div>
  </app-showcase-example>
</article>
