<article class="docs" aria-labelledby="skeleton-title">
  <header>
    <h4 id="skeleton-title" class="font-black">Skeleton</h4>
    <p>Decorative placeholders; the surrounding loading region owns the accessible status.</p>
  </header>
  <section>
    <h5>Shapes</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Skeleton shape examples"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <ui-skeleton class="line" /><ui-skeleton shape="circle" /><ui-skeleton
              class="rectangle"
              shape="rectangle"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="shapesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Composed loading state</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Composed skeleton example"
        ><ui-tab-item value="preview" label="Preview"
          ><article class="profile" aria-busy="true" aria-label="Loading profile">
            <ui-skeleton class="avatar" shape="circle" />
            <div>
              <ui-skeleton class="name" /><ui-skeleton class="detail" /><ui-skeleton
                class="short"
              />
            </div></article></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="compositionCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Static placeholder</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Static skeleton example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-skeleton
              class="rectangle"
              shape="rectangle"
              [withAnimation]="false"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="staticCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
