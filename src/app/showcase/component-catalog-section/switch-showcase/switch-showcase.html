<article class="docs" aria-labelledby="switch-title">
  <header>
    <h4 id="switch-title" class="font-black">Switch</h4>
    <p>Immediate on/off settings with descriptions, sizing, validation, and disabled reasons.</p>
  </header>
  <section>
    <h5>States</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Switch states"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview column">
            <ui-switch
              label="Product updates"
              description="Receive release announcements."
            /><ui-switch label="Two-factor authentication" [checked]="true" /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="statesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Sizes</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Switch sizes"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview column">
            <ui-switch size="sm" label="Small" [checked]="true" /><ui-switch
              label="Medium"
              [checked]="true"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="sizesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Required validation</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Required switch example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-switch
              label="Account protection"
              withErrorMessage
              [formField]="formState.protection"
            /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="validationCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Disabled reason</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Disabled switch example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-switch label="Audit mode" [formField]="formState.audit" /></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="disabledCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
