<article class="grid min-w-0 gap-5 rounded-lg bg-primary p-5">
  <div class="grid min-w-0 gap-5 md:grid-cols-2">
    <div class="grid min-w-0 content-start gap-4 rounded-lg border border-default p-4">
      <ui-switch
        label="Required off"
        description="Enable account protection before continuing."
        withErrorMessage
        [formField]="formState.requiredOff"
      />

      <ui-switch
        label="Enabled"
        description="Receive product update notifications."
        [formField]="formState.enabled"
      />
    </div>

    <div class="grid min-w-0 content-start gap-4 rounded-lg border border-default p-4">
      <ui-switch
        label="Signal disabled"
        description="Controlled by workspace policy."
        [formField]="formState.disabled"
      />

      <ui-switch label="Standalone switch" description="Remember this setting locally." [checked]="true" />
    </div>
    <div class="grid min-w-0 content-start gap-4 rounded-lg border border-default p-4 md:col-span-2">
      <ui-switch
        size="sm"
        label="Small (sm)"
        description="Compact toggle for dense settings."
        [checked]="true"
      />

      <ui-switch label="Medium (md)" description="Default toggle size." [checked]="true" />
    </div>
  </div>

  <div class="grid min-w-0 gap-2 rounded-lg border border-default p-4 text-sm">
    <p class="font-black text-muted">Signal form value</p>
    <pre class="overflow-auto rounded bg-subtle p-3 text-xs">{{ model() | json }}</pre>
  </div>
</article>
