<article class="docs" aria-labelledby="switch-title">
  <header>
    <h4 id="switch-title" class="font-black">Switch</h4>
    <p>Immediate on/off settings with descriptions, sizing, validation, and disabled reasons.</p>
  </header>
  <app-showcase-example heading="States" aria-label="Switch states" [code]="statesCode">
    <div class="preview column">
      <ui-switch label="Product updates" description="Receive release announcements." /><ui-switch
        label="Two-factor authentication"
        [checked]="true"
      />
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Sizes" aria-label="Switch sizes" [code]="sizesCode">
    <div class="preview column">
      <ui-switch size="sm" label="Small" [checked]="true" /><ui-switch
        label="Medium"
        [checked]="true"
      />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Required validation"
    aria-label="Required switch example"
    [code]="validationCode"
  >
    <div class="preview">
      <ui-switch label="Account protection" withErrorMessage [formField]="formState.protection" />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Disabled reason"
    aria-label="Disabled switch example"
    [code]="disabledCode"
  >
    <div class="preview">
      <ui-switch label="Audit mode" [formField]="formState.audit" />
    </div>
  </app-showcase-example>
</article>
