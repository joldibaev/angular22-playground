<article class="grid min-w-0 gap-3" aria-labelledby="alert-showcase-title">
  <h4 id="alert-showcase-title" class="font-black">Variants</h4>
  <ui-alert title="Market session">
    Trading closes today at 17:00. Pending orders remain active until the session ends.
  </ui-alert>

  <ui-alert title="Order rejected" variant="destructive">
    The entered quantity exceeds the available balance. Review the order and try again.
    <button uiButton uiAlertAction type="button" variant="outline" size="sm">Review order</button>
  </ui-alert>
</article>
