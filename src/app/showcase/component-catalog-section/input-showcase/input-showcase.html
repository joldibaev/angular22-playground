<article class="grid min-w-0 gap-4 rounded-lg bg-primary p-5">
  <div class="grid min-w-0 gap-4 md:grid-cols-2">
    <ui-input label="Required empty" withErrorMessage>
      <input [formField]="formState.requiredEmpty" placeholder="name@example.com" type="email" />
    </ui-input>

    <ui-input label="Required valid" withErrorMessage>
      <input [formField]="formState.requiredValid" placeholder="name@example.com" type="email" />
    </ui-input>

    <ui-input label="Optional empty">
      <input [formField]="formState.optionalEmpty" placeholder="No value" />
    </ui-input>

    <ui-input label="Optional filled">
      <input [formField]="formState.optionalFilled" />
    </ui-input>

    <ui-input label="Invalid email" withErrorMessage>
      <input [formField]="formState.invalidEmail" type="email" />
    </ui-input>

    <ui-input label="Minimum length" withErrorMessage>
      <input [formField]="formState.shortCode" />
    </ui-input>

    <ui-input label="Signal disabled">
      <input [formField]="formState.disabledField" />
    </ui-input>

    <ui-input label="Native disabled">
      <input value="Native disabled" disabled />
    </ui-input>

    <ui-input label="Loading" loading>
      <input value="Searching remote records" />
    </ui-input>

    <ui-input class="md:col-span-2" label="Textarea">
      <textarea [formField]="formState.notes" placeholder="Add escalation notes"></textarea>
    </ui-input>

    <ui-input
      class="md:col-span-2"
      label="Required textarea"
      withErrorMessage
    >
      <textarea
        [formField]="formState.requiredNotes"
        placeholder="Describe the handoff context"
      ></textarea>
    </ui-input>

    <ui-input class="md:col-span-2" label="Native disabled textarea">
      <textarea disabled>Native disabled notes</textarea>
    </ui-input>
  </div>

  <div class="grid min-w-0 gap-2 rounded-lg border border-default p-4 text-sm">
    <p class="font-black text-muted">Signal form value</p>
    <pre class="overflow-auto rounded bg-subtle p-3 text-xs">{{ model() | json }}</pre>
  </div>
</article>
