<article class="docs" aria-labelledby="input-title">
  <header>
    <h4 id="input-title" class="font-black">Input</h4>
    <p>
      Labelled text fields and textareas with native states, loading feedback, and Signal Forms
      validation and composition with input behaviors such as masks.
    </p>
  </header>
  <section>
    <h5>Text field</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Text input example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Email"
              ><input type="email" autocomplete="email" placeholder="name@example.com"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="defaultCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Number field</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Number input example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Quantity" withErrorMessage>
              <input type="number" [formField]="formState.quantity" />
            </ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="numberCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Masked fields</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Input mask examples"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview grid">
            <ui-input label="Phone">
              <input
                uiMask="+000 00 000-00-00"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+998 90 123-45-67"
                [formField]="formState.phone"
              />
            </ui-input>
            <ui-input label="Amount">
              <input
                uiMask="separator.2"
                inputmode="decimal"
                placeholder="0.00"
                [formField]="formState.amount"
              />
            </ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="maskCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
    <a
      class="mask-more-link"
      [routerLink]="[]"
      [queryParams]="{ component: 'mask' }"
      queryParamsHandling="merge"
      fragment="component-catalog"
    >
      View mask tokens, behavior, and more examples
    </a>
  </section>
  <section>
    <h5>Textarea</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Textarea example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Notes">
              <textarea placeholder="Add handoff notes"></textarea>
            </ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="textareaCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>States</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Input states"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview grid">
            <ui-input label="Disabled"><input disabled value="Managed by SSO" /></ui-input
            ><ui-input label="Loading" loading
              ><input value="Searching records"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="statesCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Validation</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Input validation example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Work email" withErrorMessage
              ><input type="email" [formField]="formState.email"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="validationCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Signal disabled reason</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Signal disabled input example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Identity"
              ><input [formField]="formState.identity"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="disabledCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
