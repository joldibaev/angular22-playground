<article class="docs" aria-labelledby="input-title">
  <header>
    <h4 id="input-title" class="font-black">Input</h4>
    <p>
      Labelled text fields and textareas with native states, loading feedback, and Signal Forms
      validation.
    </p>
  </header>
  <section>
    <h5>Text field</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Text input example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Email"
              ><input type="email" autocomplete="email" placeholder="name@example.com"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
          <pre tabindex="0"><code>{{defaultCode}}</code></pre>
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Textarea</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Textarea example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Notes">
              <textarea placeholder="Add handoff notes"></textarea>
            </ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
          <pre tabindex="0"><code>{{textareaCode}}</code></pre>
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Sizes and states</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Input sizes and states"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview grid">
            <ui-input label="Small" size="sm"><input placeholder="Compact field" /></ui-input
            ><ui-input label="Disabled"><input disabled value="Managed by SSO" /></ui-input
            ><ui-input label="Loading" loading
              ><input value="Searching records"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
          <pre tabindex="0"><code>{{statesCode}}</code></pre>
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Validation</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Input validation example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Work email" withErrorMessage
              ><input type="email" [formField]="formState.email"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
          <pre tabindex="0"><code>{{validationCode}}</code></pre>
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section>
    <h5>Signal disabled reason</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Signal disabled input example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-input label="Identity"
              ><input [formField]="formState.identity"
            /></ui-input></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
          <pre tabindex="0"><code>{{disabledCode}}</code></pre>
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
