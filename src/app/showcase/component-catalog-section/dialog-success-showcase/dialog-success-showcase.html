<article class="dialog-success-showcase" aria-labelledby="dialog-success-showcase-title">
  <header>
    <h4 id="dialog-success-showcase-title" class="font-black">Dialog success</h4>
    <p>A focused completion moment with a replayable success-check animation.</p>
  </header>

  <app-showcase-example
    heading="Default"
    aria-label="Default success dialog example"
    [code]="defaultCode"
  >
    <ng-container showcaseAuxiliary
      ><ui-dialog-success
        #paymentSuccess="uiDialogSuccess"
        title="Payment complete"
        message="A receipt has been sent to your email."
    /></ng-container>
    <div class="dialog-success-preview">
      <button
        uiButton
        type="button"
        command="show-modal"
        [attr.commandfor]="paymentSuccess.dialogId()"
      >
        Complete payment
      </button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Custom action"
    aria-label="Custom success dialog action example"
    [code]="customCode"
  >
    <ng-container showcaseAuxiliary
      ><ui-dialog-success
        #workspaceSuccess="uiDialogSuccess"
        title="Workspace created"
        message="Your team can now start collaborating."
        actionLabel="Open workspace"
        dismiss="closerequest"
        (acknowledge)="acknowledge()"
    /></ng-container>
    <div class="dialog-success-preview dialog-success-outcome">
      <button
        uiButton
        type="button"
        variant="outline"
        command="show-modal"
        [attr.commandfor]="workspaceSuccess.dialogId()"
      >
        Create workspace
      </button>
      <span aria-live="polite">{{ lastAction() }}</span>
    </div>
  </app-showcase-example>
</article>
