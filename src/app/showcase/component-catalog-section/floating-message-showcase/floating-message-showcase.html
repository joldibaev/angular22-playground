<article class="grid min-w-0 gap-12 rounded-lg bg-primary p-5">
  <div class="grid min-w-0 gap-x-20 gap-y-20 pt-8 md:grid-cols-3">
    <span class="relative inline-flex w-64" style="anchor-name: --floating-rich-message">
      Rich content
      <span
        uiFloatingMessage
        [uiFloatingMessageOpen]="true"
        style="position-anchor: --floating-rich-message"
      >
        <strong>Rich</strong>
        <span>Controlled message</span>
      </span>
    </span>

    <span class="relative inline-flex w-64" style="anchor-name: --floating-error-message">
      Error state
      <span
        uiFloatingMessage
        uiFloatingMessageVariant="red"
        [uiFloatingMessageOpen]="true"
        role="alert"
        style="position-anchor: --floating-error-message"
      >
        <span>Required</span>
        <span>Invalid email</span>
      </span>
    </span>

    <span class="relative inline-flex w-64" style="anchor-name: --floating-controlled-message">
      <button
        class="rounded-lg border border-default bg-surface px-4 py-2 font-bold outline-offset-4 focus-visible:outline-3 focus-visible:outline-(--focus-ring)"
        type="button"
        [attr.aria-describedby]="messageOpen() ? 'floating-controlled-message' : null"
        [attr.aria-pressed]="messageOpen()"
        (click)="messageOpen.set(!messageOpen())"
      >
        Toggle message
      </button>

      <span
        id="floating-controlled-message"
        uiFloatingMessage
        uiFloatingMessageVariant="inverted"
        [uiFloatingMessageOpen]="messageOpen()"
        style="position-anchor: --floating-controlled-message"
      >
        <span>Controlled by component state</span>
      </span>
    </span>
  </div>
</article>
