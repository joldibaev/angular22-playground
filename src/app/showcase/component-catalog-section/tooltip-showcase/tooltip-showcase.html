<article class="tooltip-showcase">
  @for (state of fallbackStates; track state.label) {
    <section class="tooltip-showcase-section" [attr.aria-label]="state.label">
      <div class="tooltip-showcase-section-label">{{ state.label }}</div>

      <div class="tooltip-showcase-grid">
        @for (placement of placements; track placement) {
          <button
            uiButton
            type="button"
            uiTooltip="Saved changes are available"
            [uiPlacement]="placement"
            [uiWithFallback]="state.value"
          >
            {{ placement }}
          </button>
        }
      </div>
    </section>
  }
</article>
