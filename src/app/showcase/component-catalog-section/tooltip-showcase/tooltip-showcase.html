<article class="docs" aria-labelledby="tooltip-showcase-title">
  <header>
    <h4 id="tooltip-showcase-title" class="font-black">Tooltip</h4>
    <p>Plain-text hints shown natively on hover, focus, and long press.</p>
  </header>
  <app-showcase-example heading="Default" aria-label="Default tooltip example" [code]="defaultCode">
    <div class="preview">
      <button uiButton type="button" uiTooltip="Save changes">Save</button>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Button and link triggers"
    aria-label="Tooltip trigger examples"
    [code]="triggerCode"
  >
    <div class="preview row">
      <button uiButton type="button" variant="outline" uiTooltip="Archive order">Archive</button
      ><a href="#component-catalog" uiTooltip="Return to catalog heading">Catalog link</a>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Placement and collision fallback"
    aria-label="Tooltip placement examples"
    [code]="placementCode"
  >
    <div class="preview row">
      @for (placement of placements; track placement) {
        <button
          uiButton
          type="button"
          variant="outline"
          uiTooltip="Saved changes are available"
          [uiPlacement]="placement"
          uiWithFallback
        >
          {{ placement }}
        </button>
      }
    </div>
  </app-showcase-example>
</article>
