<article class="sonner-showcase" aria-labelledby="sonner-showcase-title">
  <header class="sonner-showcase-header">
    <div>
      <h4 id="sonner-showcase-title" class="font-black">Sonner</h4>
      <p>Temporary notifications with actions, async states, positioning, and custom content.</p>
    </div>
    <p class="sonner-shortcut"><kbd>Alt</kbd> + <kbd>T</kbd> focuses the newest group</p>
  </header>

  <app-showcase-example heading="Default" aria-label="Default toast example" [code]="defaultCode">
    <div class="sonner-preview">
      <button uiButton type="button" variant="outline" (click)="showDefault()">Show toast</button>
    </div>
  </app-showcase-example>

  <app-showcase-example heading="Types" aria-label="Toast type examples" [code]="typesCode">
    <div class="sonner-preview sonner-button-row">
      <button uiButton type="button" (click)="showSuccess()">Success</button>
      <button uiButton type="button" variant="secondary" (click)="showInfo()">Info</button>
      <button uiButton type="button" variant="outline" (click)="showWarning()">Warning</button>
      <button uiButton type="button" variant="destructive" (click)="showDestructive()">
        Destructive
      </button>
    </div>
  </app-showcase-example>

  <app-showcase-example heading="Promise" aria-label="Promise toast example" [code]="promiseCode">
    <div class="sonner-preview">
      <button uiButton type="button" variant="outline" (click)="showPromise()">Run promise</button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Loading and update by ID"
    aria-label="Toast update example"
    [code]="updateCode"
  >
    <div class="sonner-preview">
      <button uiButton type="button" variant="outline" (click)="showUpdate()">
        Save watchlist
      </button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Action and cancel"
    aria-label="Toast action example"
    [code]="actionCode"
  >
    <div class="sonner-preview">
      <button uiButton type="button" variant="outline" (click)="showAction()">Queue draft</button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Custom icon"
    aria-label="Custom toast icon example"
    [code]="iconCode"
  >
    <div class="sonner-preview">
      <button uiButton type="button" variant="outline" (click)="showCustomIcon()">
        Show custom icon
      </button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Position"
    aria-label="Toast position example"
    [code]="positionCode"
  >
    <div class="sonner-preview sonner-button-row">
      @for (position of positions; track position.value) {
        <button uiButton type="button" variant="outline" (click)="showPosition(position.value)">
          {{ position.label }}
        </button>
      }
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Behavior"
    aria-label="Toast behavior examples"
    [code]="behaviorCode"
  >
    <div class="sonner-preview sonner-button-row">
      <button uiButton type="button" variant="outline" (click)="showPersistent()">
        Persistent
      </button>
      <button uiButton type="button" variant="outline" (click)="showImportant()">Important</button>
      <button uiButton type="button" variant="outline" (click)="showNonDismissible()">
        Non-dismissible
      </button>
      <button uiButton type="button" variant="outline" (click)="showLifecycle()">Callbacks</button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Stack and multiple groups"
    aria-label="Toast stack examples"
    [code]="stackCode"
  >
    <div class="sonner-preview sonner-button-row">
      <button uiButton type="button" variant="outline" (click)="showStack()">Stack four</button>
      <button uiButton type="button" variant="outline" (click)="showMultiplePositions()">
        Multiple positions
      </button>
      <button uiButton type="button" variant="ghost" (click)="dismissAll()">Dismiss all</button>
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Toaster options"
    aria-label="Toaster option example"
    [code]="toasterCode"
  >
    <div class="sonner-preview sonner-options">
      <ui-select
        label="Visible toasts"
        size="sm"
        [value]="visibleToasts().toString()"
        (valueChange)="setVisibleToasts($event)"
      >
        <ui-select-option value="1" label="1" />
        <ui-select-option value="3" label="3" />
        <ui-select-option value="5" label="5" />
      </ui-select>

      <ui-switch
        size="sm"
        label="Always expanded"
        [checked]="expanded()"
        (checkedChange)="expanded.set($event)"
      />
    </div>
  </app-showcase-example>
</article>
