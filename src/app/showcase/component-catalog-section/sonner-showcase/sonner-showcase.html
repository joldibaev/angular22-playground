<article class="sonner-showcase" aria-labelledby="sonner-showcase-title">
  <div class="sonner-showcase-header">
    <div>
      <h4 id="sonner-showcase-title" class="font-black">Sonner</h4>
      <p>Stacked notifications with actions, promise states, positioning, and keyboard access.</p>
    </div>

    <p class="sonner-showcase-shortcut">
      <kbd>Alt</kbd><span>+</span><kbd>T</kbd>
      focuses the newest notification group
    </p>
  </div>

  <section class="sonner-showcase-section" aria-labelledby="sonner-position-title">
    <h5 id="sonner-position-title">Position</h5>

    <div class="sonner-position-playground">
      <fieldset class="sonner-position-picker">
        <legend>Default toast position</legend>

        <div class="sonner-position-grid">
          @for (position of positions; track position.value) {
            <label>
              <input
                type="radio"
                name="sonner-position"
                [value]="position.value"
                [checked]="selectedPosition() === position.value"
                (change)="selectedPosition.set(position.value)"
              />
              <span>{{ position.label }}</span>
            </label>
          }
        </div>
      </fieldset>

      <div class="sonner-position-action">
        <p>Selected: <strong>{{ selectedPosition() }}</strong></p>
        <button uiButton type="button" (click)="showPositionPreview()">Show toast</button>
      </div>
    </div>
  </section>

  <section class="sonner-showcase-section" aria-labelledby="sonner-feedback-title">
    <h5 id="sonner-feedback-title">Feedback types</h5>

    <div class="sonner-showcase-grid">
      <button uiButton type="button" (click)="showSuccess()">
        <ui-icon name="outline-circle-check" decorative />
        Success
      </button>

      <button uiButton type="button" variant="secondary" (click)="showInfo()">
        <ui-icon name="outline-info-circle" decorative />
        Info
      </button>

      <button uiButton type="button" variant="outline" (click)="showWarning()">
        <ui-icon name="outline-alert-triangle" decorative />
        Warning
      </button>

      <button uiButton type="button" variant="destructive" (click)="showDestructive()">
        <ui-icon name="outline-alert-circle" decorative />
        Destructive
      </button>
    </div>
  </section>

  <section class="sonner-showcase-section" aria-labelledby="sonner-behavior-title">
    <h5 id="sonner-behavior-title">Behavior</h5>

    <div class="sonner-showcase-grid">
      <button uiButton type="button" variant="outline" (click)="showAction()">Action</button>
      <button uiButton type="button" variant="outline" (click)="showPromise()">Promise</button>
      <button uiButton type="button" variant="outline" (click)="showPersistent()">Persistent</button>
      <button uiButton type="button" variant="outline" (click)="showStack()">Stack four</button>
      <button uiButton type="button" variant="outline" (click)="showMultiplePositions()">
        Multiple positions
      </button>
      <button uiButton type="button" variant="ghost" (click)="dismissAll()">Dismiss all</button>
    </div>
  </section>

  <ui-sonner [position]="selectedPosition()" closeButton closeLabel="Dismiss notification" />
</article>
