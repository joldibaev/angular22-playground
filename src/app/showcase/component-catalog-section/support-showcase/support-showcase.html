<article class="grid min-w-0 gap-4 rounded-lg bg-primary p-5">
  <div class="flex flex-wrap items-center gap-4">
    <button
      class="rounded-lg border border-default bg-surface px-4 py-2 font-bold outline-offset-4 focus-visible:outline-3 focus-visible:outline-(--focus-ring)"
      type="button"
      uiTooltip="Hover and focus"
    >
      Default
    </button>

    <button
      class="rounded-lg bg-slate-950 px-4 py-2 font-bold text-white outline-offset-4 focus-visible:outline-3 focus-visible:outline-(--focus-ring)"
      type="button"
      uiTooltip="Always open"
      [uiTooltipOpen]="true"
    >
      Open
    </button>

    <button
      class="rounded-lg bg-slate-950 px-4 py-2 font-bold text-white outline-offset-4 focus-visible:outline-3 focus-visible:outline-(--focus-ring)"
      type="button"
      uiTooltip="Inverted"
      uiTooltipVariant="inverted"
    >
      Inverted
    </button>

    <button
      class="rounded-lg bg-rose-950 px-4 py-2 font-bold text-white outline-offset-4 focus-visible:outline-3 focus-visible:outline-(--focus-ring)"
      type="button"
      uiTooltip="Danger"
      uiTooltipVariant="red"
    >
      Danger
    </button>
  </div>

  <div class="flex flex-wrap items-center gap-4 pt-8">
    <span uiTooltip [uiTooltipOpen]="true">
      Custom surface
      <span uiTooltipSurface>
        <strong>Rich</strong>
        <span>tooltip</span>
      </span>
    </span>

    <span uiTooltip uiTooltipVariant="red" [uiTooltipOpen]="true">
      Error surface
      <span uiTooltipSurface>
        <span>Required</span>
        <span>Invalid email</span>
      </span>
    </span>
  </div>
</article>
