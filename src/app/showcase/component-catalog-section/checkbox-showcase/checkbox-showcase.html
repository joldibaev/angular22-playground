<article class="docs" aria-labelledby="checkbox-title">
  <header>
    <h4 id="checkbox-title" class="font-black">Checkbox</h4>
    <p>
      Independent boolean choices with descriptions, mixed state, sizing, and Signal Forms feedback.
    </p>
  </header>
  <app-showcase-example heading="States" aria-label="Checkbox states" [code]="statesCode">
    <div class="preview column">
      <ui-checkbox label="Unchecked" description="Optional setting." /><ui-checkbox
        label="Checked"
        [checked]="true"
      /><ui-checkbox label="Indeterminate" indeterminate />
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Sizes" aria-label="Checkbox sizes" [code]="sizesCode">
    <div class="preview column">
      <ui-checkbox size="sm" label="Small" [checked]="true" /><ui-checkbox
        label="Medium"
        [checked]="true"
      />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Required validation"
    aria-label="Required checkbox example"
    [code]="validationCode"
  >
    <div class="preview">
      <ui-checkbox
        label="Accept terms"
        description="Required before continuing."
        withErrorMessage
        [formField]="formState.terms"
      />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Disabled reason"
    aria-label="Disabled checkbox example"
    [code]="disabledCode"
  >
    <div class="preview">
      <ui-checkbox label="Audit logging" [formField]="formState.audit" />
    </div>
  </app-showcase-example>
</article>
