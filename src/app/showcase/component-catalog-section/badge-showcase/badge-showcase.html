<article class="docs" aria-labelledby="badge-showcase-title">
  <header>
    <h4 id="badge-showcase-title" class="font-black">Badge</h4>
    <p>Passive labels and statuses; use interactive components when the value can be changed.</p>
  </header>
  <app-showcase-example heading="Default" aria-label="Default badge example" [code]="defaultCode">
    <div class="preview"><ui-badge>Draft</ui-badge></div>
  </app-showcase-example>
  <app-showcase-example
    heading="Variants"
    aria-label="Badge variant examples"
    [code]="variantsCode"
  >
    <div class="preview row">
      <ui-badge>Secondary</ui-badge><ui-badge variant="contrast">Contrast</ui-badge
      ><ui-badge variant="brand">Brand</ui-badge><ui-badge variant="outline">Outline</ui-badge
      ><ui-badge variant="destructive">Destructive</ui-badge>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Status dot"
    aria-label="Badge status dot examples"
    [code]="dotCode"
  >
    <div class="preview row">
      <ui-badge withDot>Processing</ui-badge
      ><ui-badge variant="destructive" withDot>Blocked</ui-badge>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Notification"
    aria-label="Animated notification badge example"
    [code]="notificationCode"
  >
    <div class="preview notification-preview">
      <button
        uiButton
        type="button"
        variant="outline"
        iconOnly
        class="notification-trigger"
        [attr.aria-label]="
          notificationVisible() ? 'Notifications, 3 unread' : 'Notifications, none unread'
        "
      >
        <ui-icon name="outline-bell-down" decorative />
        <ui-badge variant="brand" withNotificationAnimation [visible]="notificationVisible()"
          >3</ui-badge
        >
      </button>
      <button uiButton type="button" size="sm" variant="ghost" (click)="toggleNotification()">
        {{ notificationVisible() ? 'Hide notification' : 'Show notification' }}
      </button>
    </div>
  </app-showcase-example>
  <app-showcase-example heading="Projected icon" aria-label="Badge icon example" [code]="iconCode">
    <div class="preview">
      <ui-badge variant="brand"
        ><ui-icon
          slot="start"
          name="outline-circle-check"
          decorative
          [width]="14"
          [height]="14"
        /><span>Verified</span><span slot="end">Ready</span></ui-badge
      >
    </div>
  </app-showcase-example>
</article>
