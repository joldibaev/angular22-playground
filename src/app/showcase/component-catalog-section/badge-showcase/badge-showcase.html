<article class="docs" aria-labelledby="badge-showcase-title">
  <header>
    <h4 id="badge-showcase-title" class="font-black">Badge</h4>
    <p>Passive labels and statuses; use interactive components when the value can be changed.</p>
  </header>
  <section aria-labelledby="badge-default-title">
    <h5 id="badge-default-title">Default</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Default badge example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview"><ui-badge>Draft</ui-badge></div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="defaultCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section aria-labelledby="badge-variants-title">
    <h5 id="badge-variants-title">Variants</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Badge variant examples"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <ui-badge>Secondary</ui-badge><ui-badge variant="contrast">Contrast</ui-badge
            ><ui-badge variant="brand">Brand</ui-badge><ui-badge variant="outline">Outline</ui-badge
            ><ui-badge variant="destructive">Destructive</ui-badge>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="variantsCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section aria-labelledby="badge-dot-title">
    <h5 id="badge-dot-title">Status dot</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Badge status dot examples"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview row">
            <ui-badge withDot>Processing</ui-badge
            ><ui-badge variant="destructive" withDot>Blocked</ui-badge>
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="dotCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
  <section aria-labelledby="badge-notification-title">
    <h5 id="badge-notification-title">Notification</h5>
    <ui-card variant="outlined">
      <ui-tab size="sm" aria-label="Animated notification badge example">
        <ui-tab-item value="preview" label="Preview">
          <div class="preview notification-preview">
            <button
              uiButton
              type="button"
              variant="outline"
              iconOnly
              class="notification-trigger"
              [attr.aria-label]="
                notificationVisible() ? 'Notifications, 3 unread' : 'Notifications, none unread'
              "
            >
              <ui-icon name="outline-bell-down" decorative />
              <ui-badge
                variant="brand"
                withNotificationAnimation
                [visible]="notificationVisible()"
                >3</ui-badge
              >
            </button>
            <button uiButton type="button" size="sm" variant="ghost" (click)="toggleNotification()">
              {{ notificationVisible() ? 'Hide notification' : 'Show notification' }}
            </button>
          </div>
        </ui-tab-item>
        <ui-tab-item value="code" label="Code">
<app-showcase-code [code]="notificationCode" />
        </ui-tab-item>
      </ui-tab>
    </ui-card>
  </section>
  <section aria-labelledby="badge-icon-title">
    <h5 id="badge-icon-title">Projected icon</h5>
    <ui-card variant="outlined"
      ><ui-tab size="sm" aria-label="Badge icon example"
        ><ui-tab-item value="preview" label="Preview"
          ><div class="preview">
            <ui-badge variant="brand"
              ><ui-icon
                name="outline-circle-check"
                decorative
                [width]="14"
                [height]="14"
              />Verified</ui-badge
            >
          </div></ui-tab-item
        ><ui-tab-item value="code" label="Code">
<app-showcase-code [code]="iconCode" />
        </ui-tab-item></ui-tab
      ></ui-card
    >
  </section>
</article>
