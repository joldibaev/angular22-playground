<article class="docs" aria-labelledby="progress-title">
  <header>
    <h4 id="progress-title" class="font-black">Progress</h4>
    <p>Native determinate and indeterminate progress with a custom visual track.</p>
  </header>
  <app-showcase-example
    heading="Determinate"
    aria-label="Determinate progress example"
    [code]="determinateCode"
  >
    <div class="preview column">
      <div class="progress-variant">
        <span>Upload progress</span>
        <ui-progress label="Upload progress" [value]="progress()" withValue />
      </div>
      <div class="progress-actions">
        <button
          uiButton
          type="button"
          size="sm"
          variant="ghost"
          data-progress-decrease
          [disabled]="progress() === 0"
          (click)="decreaseProgress()"
        >
          Decrease
        </button>
        <button
          uiButton
          type="button"
          size="sm"
          variant="secondary"
          data-progress-increase
          [disabled]="progress() === 100"
          (click)="increaseProgress()"
        >
          Increase
        </button>
      </div>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Custom maximum"
    aria-label="Custom maximum progress example"
    [code]="maxCode"
  >
    <div class="preview column">
      <span>72 of 120</span><ui-progress label="Import progress" [value]="72" [max]="120" />
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Indeterminate"
    aria-label="Indeterminate progress example"
    [code]="indeterminateCode"
  >
    <div class="preview column">
      <span>Preparing report</span><ui-progress label="Preparing report" />
    </div>
  </app-showcase-example>
</article>
