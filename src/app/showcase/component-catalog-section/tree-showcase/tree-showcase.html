<article class="docs" aria-labelledby="tree-showcase-title">
  <header>
    <h4 id="tree-showcase-title" class="font-black">Tree</h4>
    <p>
      Hierarchical navigation and selection with lazy branches, typeahead, and roving keyboard
      focus.
    </p>
  </header>
  <app-showcase-example heading="Default" aria-label="Default tree example" [code]="defaultCode">
    <div class="preview">
      <ui-tree aria-label="Project files" [items]="files" [(selected)]="selected" /><output
        >Selected: {{ selected().join(', ') || 'None' }}</output
      >
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Multiple selection"
    aria-label="Multiple tree selection example"
    [code]="multiCode"
  >
    <div class="preview">
      <ui-tree
        aria-label="Multi-select project files"
        [items]="files"
        multi
        [(selected)]="multiSelected"
      /><output>Selected: {{ multiSelected().join(', ') || 'None' }}</output>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Controlled expansion and guides"
    aria-label="Controlled tree expansion example"
    [code]="expansionCode"
  >
    <div class="preview">
      <ui-tree
        aria-label="Tree without guides"
        [items]="files"
        [(expanded)]="expanded"
        [withGuides]="false"
      /><output>Expanded: {{ expanded()?.join(', ') || 'None' }}</output>
    </div>
  </app-showcase-example>
  <app-showcase-example
    heading="Navigation, disabled, and non-selectable nodes"
    aria-label="Tree navigation example"
    [code]="navCode"
  >
    <div class="preview">
      <ui-tree
        aria-label="Project navigation"
        [items]="files"
        nav
        [(selected)]="navSelected"
      /><output>Current page: {{ navSelected()[0] || 'None' }}</output>
    </div>
  </app-showcase-example>
</article>
