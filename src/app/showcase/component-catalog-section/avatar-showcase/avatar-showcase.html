<article class="avatar-showcase" aria-labelledby="avatar-showcase-title">
  <header class="avatar-showcase-header">
    <h4 id="avatar-showcase-title" class="font-black">Avatar</h4>
    <p>User imagery with deterministic initials and an anonymous decorative placeholder.</p>
  </header>

  <app-showcase-example heading="Default" aria-label="Default avatar example" [code]="defaultCode">
    <div class="avatar-preview">
      <ui-avatar name="Ada Lovelace" src="https://i.pravatar.cc/96?img=5" />
    </div>
  </app-showcase-example>

  <app-showcase-example heading="Sizes" aria-label="Avatar size examples" [code]="sizeCode">
    <div class="avatar-preview avatar-row">
      <ui-avatar size="sm" name="Ada Lovelace" /><ui-avatar
        size="md"
        name="Ada Lovelace"
      /><ui-avatar size="lg" name="Ada Lovelace" />
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Initials and image fallback"
    aria-label="Avatar fallback examples"
    [code]="fallbackCode"
  >
    <div class="avatar-preview avatar-row">
      <ui-avatar name="Grace Hopper" /><ui-avatar name="Broken Image" src="/missing-avatar.webp" />
    </div>
  </app-showcase-example>

  <app-showcase-example
    heading="Named and anonymous"
    aria-label="Avatar accessibility examples"
    [code]="placeholderCode"
  >
    <div class="avatar-preview avatar-row"><ui-avatar name="Linus Torvalds" /><ui-avatar /></div>
  </app-showcase-example>
</article>
